name: Dependabot auto-merge

# Dependabot PRs are exempt from the human-approval requirement: this workflow
# auto-approves and enables auto-merge for minor/patch bumps (both NuGet and
# GitHub Actions), so they merge as soon as CI + CodeQL pass — no human in the loop.
# Major bumps are left for manual review (they can break the build or the API).

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge (minor/patch)
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          # Approve as github-actions[bot] via GITHUB_TOKEN. On Dependabot-triggered runs only
          # Dependabot secrets are exposed (not Actions secrets like ADMIN_PAT), so GITHUB_TOKEN
          # is what's actually available here. This approval counts toward the ruleset's required
          # 1 approval because repo-settings.yml enables "Allow GitHub Actions to approve PRs".
          # The `permissions:` block above elevates the otherwise read-only Dependabot token.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"

      - name: Flag major updates for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" --body "This is a **major** version bump — leaving it for manual review (auto-merge applies to minor/patch only)."
