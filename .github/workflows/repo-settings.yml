name: Apply repo settings

# Enforces repository-level knobs as code (auto-merge enablement, allowed merge methods,
# branch cleanup) plus the security toggles. Complements the branch ruleset in
# .github/rulesets/ (which governs branch protection).
#
# REQUIRED PAT SCOPE:
#   ADMIN_PAT must include "Administration: read and write". PATCH /repos/{owner}/{repo}
#   is an admin endpoint the built-in GITHUB_TOKEN can't reach. Create a fine-grained PAT
#   at https://github.com/settings/personal-access-tokens scoped to this repo with
#   Repository permissions → Administration → Read and write, and save it as the
#   ADMIN_PAT repo secret.
#
# Without the PAT this workflow fails with 403 and the repo keeps whatever the UI last had.
# (The initial settings were also applied once via `gh` at setup time; this workflow keeps
# them in sync when the file changes.)

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repo-settings.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-settings
  cancel-in-progress: false

jobs:
  apply:
    name: PATCH repo settings via API
    runs-on: ubuntu-latest
    steps:
      - name: Verify PAT is available
        id: verify
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::ADMIN_PAT secret is unset — skipping repo-settings sync. The settings were applied at setup via gh; add an ADMIN_PAT (Administration: read/write) to enable syncing them from CI."
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply settings
        if: steps.verify.outputs.has_pat == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          set -euo pipefail
          echo "Applying repo settings to $GITHUB_REPOSITORY..."

          #   allow_auto_merge       : true  — required by every `gh pr merge --auto`
          #   allow_squash_merge     : true  — matches the ruleset (squash only)
          #   allow_merge_commit     : false — ruleset requires linear history
          #   allow_rebase_merge     : false — squash only; UI alignment
          #   delete_branch_on_merge : true  — keeps the branch list clean
          gh api "repos/$GITHUB_REPOSITORY" \
            --method PATCH \
            -F allow_auto_merge=true \
            -F allow_squash_merge=true \
            -F allow_merge_commit=false \
            -F allow_rebase_merge=false \
            -F delete_branch_on_merge=true

          echo "Repository settings applied. Current state:"
          gh api "repos/$GITHUB_REPOSITORY" --jq '{
            allow_auto_merge,
            allow_squash_merge,
            allow_merge_commit,
            allow_rebase_merge,
            delete_branch_on_merge
          }'

          # Security toggles (dedicated endpoints; PUT enables, idempotent).
          echo
          echo "Enabling Dependabot vulnerability alerts..."
          gh api "repos/$GITHUB_REPOSITORY/vulnerability-alerts" --method PUT

          echo "Enabling Dependabot automated security fixes..."
          gh api "repos/$GITHUB_REPOSITORY/automated-security-fixes" --method PUT

          echo "Enabling private vulnerability reporting..."
          gh api "repos/$GITHUB_REPOSITORY/private-vulnerability-reporting" --method PUT

          # Let github-actions[bot] submit approving reviews that COUNT toward the ruleset's
          # required 1 approval. This is what lets the Dependabot and owner auto-merge flows
          # self-approve (they approve as github-actions[bot], then enable auto-merge on green).
          # Preserve the current default_workflow_permissions; only flip the approve toggle.
          echo
          echo "Allowing GitHub Actions to create and approve pull requests..."
          current_default=$(gh api "repos/$GITHUB_REPOSITORY/actions/permissions/workflow" --jq '.default_workflow_permissions')
          gh api "repos/$GITHUB_REPOSITORY/actions/permissions/workflow" --method PUT \
            -F default_workflow_permissions="$current_default" \
            -F can_approve_pull_request_reviews=true
